services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: ${ORBIT_ENV_FILE:-.env.production}
    volumes:
      - orbit_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

  orbit:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ${ORBIT_ENV_FILE:-.env.production}
    ports:
      - "127.0.0.1:4100:4000"
    volumes:
      - orbit_uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  orbit_postgres:
  orbit_uploads:
